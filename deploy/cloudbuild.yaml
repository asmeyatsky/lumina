# =============================================================================
# Google Cloud Build — LUMINA CI/CD Pipeline
# =============================================================================
# Trigger: push to main branch
# Required substitutions: _REGION, _ARTIFACT_REPO, _BACKEND_SERVICE, _FRONTEND_SERVICE
# =============================================================================

substitutions:
  _REGION: us-central1
  _ARTIFACT_REPO: lumina-docker
  _BACKEND_IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/backend
  _FRONTEND_IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/frontend
  _BACKEND_SERVICE: lumina-backend
  _FRONTEND_SERVICE: lumina-frontend
  _VPC_CONNECTOR: lumina-vpc-connector

steps:
  # ---------------------------------------------------------------------------
  # 1. Build backend Docker image
  # ---------------------------------------------------------------------------
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_BACKEND_IMAGE}:${SHORT_SHA}
      - -t
      - ${_BACKEND_IMAGE}:latest
      - -f
      - Dockerfile
      - .

  # ---------------------------------------------------------------------------
  # 2. Build frontend Docker image
  # ---------------------------------------------------------------------------
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_FRONTEND_IMAGE}:${SHORT_SHA}
      - -t
      - ${_FRONTEND_IMAGE}:latest
      - -f
      - frontend/Dockerfile
      - frontend
    waitFor: ["-"]

  # ---------------------------------------------------------------------------
  # 3. Push backend image to Artifact Registry
  # ---------------------------------------------------------------------------
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_BACKEND_IMAGE}
    waitFor:
      - build-backend

  # ---------------------------------------------------------------------------
  # 4. Push frontend image to Artifact Registry
  # ---------------------------------------------------------------------------
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_FRONTEND_IMAGE}
    waitFor:
      - build-frontend

  # ---------------------------------------------------------------------------
  # 5. Run database migrations
  # ---------------------------------------------------------------------------
  - id: run-migrations
    name: ${_BACKEND_IMAGE}:${SHORT_SHA}
    entrypoint: python
    args:
      - -m
      - alembic
      - upgrade
      - head
    env:
      - DATABASE_URL=$$DATABASE_URL
    secretEnv:
      - DATABASE_URL
    waitFor:
      - push-backend

  # ---------------------------------------------------------------------------
  # 6. Deploy backend to Cloud Run
  # ---------------------------------------------------------------------------
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_BACKEND_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --memory=1Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=10
      - --concurrency=100
      - --port=8000
      - --vpc-connector=${_VPC_CONNECTOR}
      - --set-secrets=DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,OPENAI_API_KEY=openai-api-key:latest
      - --allow-unauthenticated
    waitFor:
      - run-migrations

  # ---------------------------------------------------------------------------
  # 7. Deploy frontend to Cloud Run
  # ---------------------------------------------------------------------------
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_FRONTEND_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=250
      - --port=80
      - --allow-unauthenticated
    waitFor:
      - push-frontend

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/database-url/versions/latest
      env: DATABASE_URL

images:
  - ${_BACKEND_IMAGE}:${SHORT_SHA}
  - ${_BACKEND_IMAGE}:latest
  - ${_FRONTEND_IMAGE}:${SHORT_SHA}
  - ${_FRONTEND_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
