# =============================================================================
# Cloud Run Service — LUMINA Frontend
# Apply: gcloud run services replace deploy/cloud-run-frontend.yaml --region us-central1
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lumina-frontend
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: "LUMINA AI Visibility Platform — Frontend"
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 250
      timeoutSeconds: 60
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/lumina-docker/frontend:latest
          ports:
            - containerPort: 80
              name: http1
          resources:
            limits:
              memory: 256Mi
              cpu: "1"
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
